<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาหนังสือรุ่นนักเรียนเตรียมทหาร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-purple: #4a148c; /* ม่วงเข้ม */
            --mid-purple: #7c43bd;     /* ม่วงกลาง */
            --light-purple: #f3e5f5;   /* ม่วงอ่อนมาก (พื้นหลัง) */
            --accent-purple: #ab47bc;  /* ม่วงสด (ปุ่ม) */
            --text-dark: #212121;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--light-purple); 
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Common Styles */
        .card { 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(74, 20, 140, 0.1); 
            background: white;
        }

        /* 📌 Login Style */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container { 
            width: 100%;
            max-width: 420px; 
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-purple), var(--mid-purple));
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .login-body {
            padding: 30px;
        }

        .form-control:focus {
            border-color: var(--mid-purple);
            box-shadow: 0 0 0 0.25rem rgba(124, 67, 189, 0.25);
        }

        /* 📌 Search Style */
        .search-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 30px 15px;
            display: none; /* ซ่อนไว้ก่อน Login */
        }

        .main-header {
            color: var(--primary-purple);
            font-weight: 700;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--accent-purple);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Buttons */
        .btn-purple { 
            background-color: var(--accent-purple); 
            color: white; 
            border: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-purple:hover { 
            background-color: var(--primary-purple); 
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-purple {
            color: var(--mid-purple);
            border-color: var(--mid-purple);
        }
        .btn-outline-purple:hover {
            background-color: var(--mid-purple);
            color: white;
        }

        /* Table Style */
        .table-section {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .table thead th {
            background-color: var(--primary-purple);
            color: white;
            border: none;
            padding: 15px;
        }

        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            border-color: #eee;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(243, 229, 245, 0.5);
        }

        /* Download Button in Table */
        .btn-download {
            background-color: #66bb6a; /* สีเขียวเดิมเพื่อให้เด่น แต่ปรับให้อ่อนลงเล็กน้อย */
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #43a047;
            color: white;
        }

        /* Mobile Optimization */
        @media (max-width: 576px) {
            .table thead { display: none; }
            .table tbody td { display: block; width: 100%; text-align: left; padding: 10px 15px; border: none;}
            .table tbody td:first-child { font-weight: bold; color: var(--mid-purple); background: #f9f9f9; padding-top: 15px; border-radius: 10px 10px 0 0;}
            .table tbody td:last-child { padding-bottom: 15px; border-bottom: 1px solid #eee; border-radius: 0 0 10px 10px;}
            .table tbody td::before { content: attr(data-label); font-weight: 600; color: #777; margin-right: 10px; }
            .btn-download { width: 100%; justify-content: center; }
            .search-container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-page">
        <div class="login-container">
            <div class="card overflow-hidden">
                <div class="login-header">
                    <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
                    <h3 class="mt-3">เข้าสู่ระบบ</h3>
                    <p class="opacity-75">ระบบค้นหาหนังสือรุ่นนักเรียนเตรียมทหาร</p>
                </div>
                <div class="login-body">
                    <div class="mb-3">
                        <label class="form-label text-muted">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" id="username" class="form-control" placeholder="กรอก username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="กรอก Password">
                        </div>
                    </div>
                    <button onclick="handleLogin()" class="btn btn-purple w-100 py-2.5 rounded-pill shadow-sm">
                        Login <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                    
                    <div id="loginError" class="alert alert-danger mt-3 text-center py-2" style="display:none; font-size: 0.9rem;">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i> Username หรือ Password ไม่ถูกต้อง!
                    </div>
                </div>
            </div>
            <div class="text-center mt-4 text-muted" style="font-size: 0.8rem;">
                โรงเรียนเตรียมทหาร สถาบันวิชาการป้องกันประเทศ
            </div>
        </div>
    </div>

    <div id="searchPage" class="search-container">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div class="d-flex align-items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/32/Emblem_of_Armed_Forces_Academies_Preparatory_School%2C_Thailand.jpg" style="height: 50px;">
                <div>
                    <h4 class="mb-0 fw-bold" style="color: var(--primary-purple);">ค้นหาหนังสือรุ่นนักเรียนเตรีบมทหาร</h4>
                    <small class="text-muted">กองสถิติและประเมินผล โรงเรียนเตรียมทหาร</small>
                </div>
            </div>
            <button onclick="location.reload()" class="btn btn-outline-purple btn-sm rounded-pill px-3">
                <i class="bi bi-power me-1"></i> ออกจากระบบ
            </button>
        </div>

        <div class="card p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-7 col-lg-8">
                    <label class="form-label fw-600 text-muted">
                        <i class="bi bi-wifi me-1"></i> เลือกประเภทการเชื่อมต่อระบบเครือข่ายแสดงข้อมูล
                    </label>
                    <select id="searchType" class="form-select form-select-lg" style="font-size: 1rem; border-radius: 10px;">
                        <option value="intranet">💻 ค้นหาแบบอินทราเน็ต (ใช้งานภายใน รร.ตท.)</option>
                        <option value="internet">🌐 ค้นหาแบบอินเทอร์เน็ต (ใช้งานภายนอก)</option>
                    </select>
                </div>
                <div class="col-md-5 col-lg-4 d-flex align-items-end">
                    <button onclick="generateTable()" class="btn btn-purple btn-lg w-100 shadow-sm" style="border-radius: 10px;">
                        <i class="bi bi-search me-1"></i> แสดงข้อมูล
                    </button>
                </div>
            </div>
        </div>

        <div id="resultSection" style="display:none;">
            <div class="table-section">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th width="15%">ลำดับ</th>
                                <th width="55%"><center>ชื่อหนังสือรุ่น</center></th>
                                <th width="30%" class="text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันจัดการ Login (Logic เหมือนเดิม)
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'sed' && pass === 'sed@afaps5413') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('searchPage').style.display = 'block';
                // เลือกชนิดการค้นหาอัตโนมัติ (เช่น อินเทอร์เน็ตเป็นค่าเริ่มต้น)
                document.getElementById('searchType').value = 'internet';
                generateTable(); 
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.style.display = 'block';
                // ใส่ Animation สั่นเล็กน้อยถ้าผิด
                errorDiv.classList.add('animate__animated', 'animate__headShake');
                setTimeout(() => errorDiv.classList.remove('animate__animated', 'animate__headShake'), 500);
            }
        }

        // ฟังก์ชันสร้างตารางข้อมูล (เพิ่ม Responsive attributes)
        function generateTable() {
            const type = document.getElementById('searchType').value;
            const tbody = document.getElementById('resultBody');
            const resultSection = document.getElementById('resultSection');
            tbody.innerHTML = '';

            // URL Base ตามโจทย์
            const baseUrl = type === 'intranet' 
                ? 'https://www.afaps.ac.th/subdomain/sed/gallery/book/' 
                : 'https://www.afaps.ac.th/subdomain/sed/gallery/';

            for (let i = 1; i <= 80; i++) {
                // เพิ่ม data-label สำหรับ Responsive บนมือถือ
                const row = `
                    <tr>
                        <td data-label="ลำดับ">${i}</td>
                        <td data-label="ชื่อหนังสือรุ่น">
                            <span class="fw-bold" style="color: var(--primary-purple);">นักเรียนเตรียมทหาร รุ่นที่ ${i}</span>
                        </td>
                        <td data-label="จัดการ" class="text-center">
                            <a href="${baseUrl}${i}.pdf" target="_blank" class="btn-download">
                                <i class="bi bi-cloud-download"></i> Download PDF
                            </a>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
            
            // แสดงส่วนผลลัพธ์พร้อมเลื่อนหน้าจอลงมา
            resultSection.style.display = 'block';
            window.scrollTo({ top: resultSection.offsetTop - 20, behavior: 'smooth' });
        }

        // ฟัง event กด Enter ในช่อง Password เพื่อ Login
        document.getElementById("password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleLogin();
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</body>
</html>
