<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ค้นหาหนังสือรุ่นนักเรียนเตรียมทหาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container login-container">
        <h2>เข้าสู่ระบบสารสนเทศ</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน (Username):</label>
                <input type="text" id="username" required placeholder="กรุณากรอก Username">
            </div>
            <div class="form-group">
                <label for="password">รหัสผ่าน (Password):</label>
                <input type="password" id="password" required placeholder="กรุณากรอก Password">
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
